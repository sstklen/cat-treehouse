name: "🐱 Enter the Draw"
description: "Win a treehouse stay for you + 3 friends before Code with Claude Tokyo"
title: "🐱 I'm in!"
labels: ["entry"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🐱 cat Treehouse — Giveaway

        **1 winner + 3 friends** · 3 days, 2 nights · Private car from Tokyo
        Entries close **May 1, 2026**

        Your GitHub stars are your lottery tickets — we check automatically via API.
        More stars = better odds. Just confirm below and you're in.

        ⭐ **Don't forget to star this repo** — help others discover the giveaway.

  - type: textarea
    id: building
    attributes:
      label: "What are you building with Claude? (optional)"
      placeholder: "One sentence is fine. Or leave blank — your code speaks for itself."
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: "Confirm"
      options:
        - label: "I'm a Claude Max subscriber"
          required: true
        - label: "I can be in Tokyo June 7–9, 2026"
          required: true
