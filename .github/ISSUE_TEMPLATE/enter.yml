name: "🐱 Enter the Draw"
description: "Win a treehouse stay for you + 3 friends before Code with Claude Tokyo"
title: "🐱 I'm in!"
labels: ["entry"]
body:
  - type: markdown
    attributes:
      value: |
        ## 🐱 cat Treehouse — Giveaway

        **1 winner + 3 friends** · 3 days, 2 nights · Private car from Tokyo
        Entries close **May 1, 2026**

        Your GitHub stars are your lottery tickets — we check automatically via API.
        More stars = better odds. Just confirm below and you're in.

        ⭐ **Don't forget to star this repo** — help others discover the giveaway.

  - type: textarea
    id: building
    attributes:
      label: "What are you building with Claude? (optional)"
      placeholder: "One sentence is fine. Or leave blank — your code speaks for itself."
    validations:
      required: false

  - type: checkboxes
    id: confirm
    attributes:
      label: "Confirm 確認"
      options:
        - label: "I'm a Claude Max subscriber"
          required: true
        - label: "I can be in Tokyo June 7–9, 2026"
          required: true

  - type: checkboxes
    id: meetup
    attributes:
      label: "🇹🇼🇯🇵 Community Events 社群活動（optional 自由參加）"
      description: |
        Didn't win? You can still join these community events!
        沒抽到也能來！以下是台日 Claude 社群的民間活動。

        **~$60 USD per event**（each includes venue + drinks & food 每場含場地、飲料、餐點）
        Confirmation & payment details sent 1 month before the event.
        活動前一個月發參加通知，確認人數後預訂場地。
      options:
        - label: "6/9 evening — TW×JP Claude Community Meetup 台日社群交流會（~$60 USD）"
          required: false
        - label: "6/10 — Livestream + After-party 直播+二次會（~$60 USD）"
          required: false
        - label: "🇹🇼 Notify me about the next meetup in Taiwan! 下次臺灣交流會通知我！"
          required: false
